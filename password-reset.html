<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Відновлення пароля | MacShnaknels</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <header class="header">
    <div class="container header__wrapper">
      <a href="index.html" class="logo">Mac<span>Shnaknels</span></a>

      <nav class="nav">
        <a href="index.html">Головна</a>
        <a href="login.html">Вхід</a>
        <a href="register.html">Реєстрація</a>
      </nav>
    </div>
  </header>

  <main class="profile-page">
    <div class="container profile-grid">
      <section class="profile-card">
        <h1>Відновлення пароля</h1>
        <p>Введіть email, щоб отримати токен для відновлення пароля.</p>

        <form id="forgotPasswordForm">
          <label>
            Email
            <input type="email" id="forgotEmail" placeholder="example@gmail.com" required />
          </label>

          <button type="submit">Отримати reset token</button>
        </form>

        <p id="forgotMessage" class="message"></p>
      </section>

      <section class="profile-card">
        <h2>Скидання пароля</h2>
        <p>Вставте отриманий reset token і введіть новий пароль.</p>

        <form id="resetPasswordForm">
          <label>
            Reset token
            <input type="text" id="resetToken" placeholder="Вставте токен" required />
          </label>

          <label>
            Новий пароль
            <input type="password" id="resetNewPassword" required />
          </label>

          <label>
            Підтвердження нового пароля
            <input type="password" id="resetConfirmPassword" required />
          </label>

          <button type="submit">Змінити пароль</button>
        </form>

        <p id="resetMessage" class="message"></p>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 MacShnaknels. Усі права захищено.</p>
    </div>
  </footer>

  <script src="js/password-reset.js"></script>
</body>
</html>
